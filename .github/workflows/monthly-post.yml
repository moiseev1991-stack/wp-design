name: Monthly Post Generation

on:
  schedule:
    # 1st of each month, 09:00 UTC
    - cron: '0 9 1 * *'
  workflow_dispatch:

concurrency:
  group: monthly-post
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate post
        run: node scripts/generate-post.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add content/posts/ public/illustrations/
          if git diff --staged --quiet; then
            echo "No changes to commit (generator produced nothing new)."
          else
            git commit -m "content: add monthly auto post"
            git push origin HEAD:master
          fi
